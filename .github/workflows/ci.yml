# CI workflow (automated)
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]
  # Allow manual runs from any branch when needed for debugging or retries
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI-safe defaults (override in repo/environment secrets if needed)
  NODE_ENV: test
  NEXT_TELEMETRY_DISABLED: "1"
  JWT_SECRET: test-secret-value-123
  SESSION_SECRET: ci-test-secret-at-least-32-characters-long
  SIGN_OUT_TOKEN_SECRET: ci-test-signout-secret-at-least-32-characters
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  CRON_SECRET: ci-test-cron-secret-at-least-16
  TRUST_PROXY: "0"
  ALLOW_TEST_RUNNER: "1"
  TEST_RUNNER_SECRET_KEY: ${{ secrets.TEST_RUNNER_SECRET_KEY }}

jobs:
  guardrails-lint:
    name: guardrails-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps (workspace)
        run: npm ci

      - name: Run guardrails-lint
        run: npm run guardrails-lint

  policy-check:
    name: policy-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps (workspace)
        run: npm ci

      - name: Run policy-check
        run: npm run policy-check

  guardrails-tests:
    name: guardrails-tests
    runs-on: ubuntu-latest
    needs: [guardrails-lint, policy-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps (workspace)
        run: npm ci

      - name: Run guardrails-tests
        run: npm run guardrails-tests

  parity-gate:
    name: parity-gate
    runs-on: ubuntu-latest
    needs: [guardrails-lint, policy-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps (workspace)
        run: npm ci

      - name: Run competitor parity release gate
        run: npm run parity-gate

  quality:
    name: Lint Typecheck Unit
    runs-on: ubuntu-latest
    needs: [guardrails-lint, policy-check, guardrails-tests, parity-gate]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inductlite
          POSTGRES_PASSWORD: inductlite_dev_password
          POSTGRES_DB: inductlite
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U inductlite"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://inductlite:inductlite_dev_password@localhost:5432/inductlite?schema=public
      # Provide a direct URL for Prisma CLI (migrations/generate) to avoid Prisma P1012 in CI
      DATABASE_DIRECT_URL: postgresql://inductlite:inductlite_dev_password@localhost:5432/inductlite?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Cache Next build artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next/cache
          key: ${{ runner.os }}-nextcache-${{ hashFiles('package-lock.json', 'apps/web/next.config.*', 'apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextcache-

      - name: Install deps (workspace)
        run: npm ci

      - name: Prisma generate
        run: npm run -w apps/web db:generate

      - name: Prisma validate
        run: npm run -w apps/web prisma:validate

      - name: Prisma format check
        run: npm run -w apps/web prisma:format:check

      - name: Migrate DB
        run: npm run -w apps/web db:migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Lint (workspace via turbo)
        run: npm run lint

      - name: Typecheck (workspace via turbo)
        run: npm run typecheck

      - name: Unit tests (workspace via turbo)
        run: npm run test

      - name: Coverage (apps/web)
        run: npm run -w apps/web test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: apps/web/coverage/
          retention-days: 7

  integration:
    name: Integration tests (apps/web)
    runs-on: ubuntu-latest
    needs: [quality]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inductlite_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inductlite_integration?schema=public
      DATABASE_DIRECT_URL: postgresql://postgres:postgres@localhost:5432/inductlite_integration?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Cache Next build artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next/cache
          key: ${{ runner.os }}-nextcache-${{ hashFiles('package-lock.json', 'apps/web/next.config.*', 'apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextcache-

      - name: Install deps (workspace)
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate

      - name: Prisma validate
        run: npm run -w apps/web prisma:validate

      - name: Migrate DB
        run: npm run -w apps/web db:migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Integration tests
        run: npm run -w apps/web test:integration

  e2e:
    name: E2E smoke (chromium)
    runs-on: ubuntu-latest
    needs: [quality, integration, parity-gate, guardrails-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inductlite_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inductlite_e2e?schema=public
      DATABASE_DIRECT_URL: postgresql://postgres:postgres@localhost:5432/inductlite_e2e?schema=public
      BASE_URL: http://localhost:3000
      PLAYWRIGHT_BROWSERS_PATH: "0"
      E2E_RETRIES: "0"
      SESSION_COOKIE_SECURE: "0"
      DATA_ENCRYPTION_KEY: ci-test-data-encryption-key-at-least-32-characters
      # Test-only stubs for services not required in CI e2e runs
      MAGIC_LINK_SECRET: ci-magic-link-secret
      RESEND_API_KEY: ci-resend-key
      RESEND_FROM: ci@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Cache Next and Playwright artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next/cache
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-e2e-cache-${{ hashFiles('package-lock.json', 'apps/web/next.config.*', 'apps/web/playwright.config.ts', 'apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-e2e-cache-

      - name: Install deps (workspace)
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate

      - name: Prisma validate
        run: npm run -w apps/web prisma:validate

      - name: Prisma format check
        run: npm run -w apps/web prisma:format:check

      - name: Migrate DB
        run: npm run -w apps/web db:migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed DB
        run: npm run -w apps/web db:seed

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Build
        env:
          NODE_ENV: production
        run: npm run -w apps/web build

      - name: Start standalone server
        run: |
          set -euo pipefail
          cd apps/web
          export PORT=3000
          export NODE_ENV=test
          # Next standalone output excludes client static/public files by default.
          # Copy them into the traced standalone tree so browser bundles can load.
          if [ -f .next/standalone/server.js ]; then
            mkdir -p .next/standalone/.next
            rm -rf .next/standalone/.next/static
            cp -R .next/static .next/standalone/.next/static
            rm -rf .next/standalone/public
            cp -R public .next/standalone/public
          elif [ -f .next/standalone/apps/web/server.js ]; then
            mkdir -p .next/standalone/apps/web/.next
            rm -rf .next/standalone/apps/web/.next/static
            cp -R .next/static .next/standalone/apps/web/.next/static
            rm -rf .next/standalone/apps/web/public
            cp -R public .next/standalone/apps/web/public
          fi
          if [ -f .next/standalone/server.js ]; then
            node .next/standalone/server.js &
          elif [ -f .next/standalone/apps/web/server.js ]; then
            node .next/standalone/apps/web/server.js &
          else
            echo "Standalone server not found. Available server.js files:"
            find .next/standalone -name server.js -print || true
            exit 1
          fi
          echo $! > /tmp/web.pid
        env:
          NODE_ENV: test
          ALLOW_TEST_RUNNER: "1"
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TRUST_PROXY: "1"

      - name: Wait for app
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          exit 1

      - name: Run E2E smoke (desktop chromium)
        run: |
          set -euo pipefail
          cd apps/web
          npm run test:e2e:smoke 2>&1 | tee playwright-output.txt
          test_exit=${PIPESTATUS[0]}
          if [ $test_exit -ne 0 ]; then
            echo "Playwright tests failed with exit code $test_exit"
            exit $test_exit
          fi
        env:
          E2E_USE_SHARED_SERVER: "1"
          ALLOW_TEST_RUNNER: "1"
          BASE_URL: http://localhost:3000
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TRUST_PROXY: "1"

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/web.pid ]; then
            kill $(cat /tmp/web.pid) || true
          fi
        env:
          BASE_URL: http://localhost:3000
          TRUST_PROXY: "1"
          ALLOW_TEST_RUNNER: "1"

      - name: Print Playwright diagnostics
        if: failure()
        run: |
          echo "=== Playwright log (start) ==="
          if [ -f apps/web/playwright-output.txt ]; then
            sed -n '1,400p' apps/web/playwright-output.txt || true
          else
            echo "No Playwright log found at apps/web/playwright-output.txt"
          fi
          echo "=== Playwright report dir ==="
          ls -la apps/web/playwright-report || true
          if [ -f apps/web/playwright-report/index.html ]; then
            echo "=== Report head (index.html) ==="
            head -n 200 apps/web/playwright-report/index.html || true
          fi

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-artifacts
          path: |
            apps/web/playwright-report/**
            apps/web/test-results/**
            apps/web/playwright-output.txt
          retention-days: 7

  release-confidence:
    name: Release Confidence (E2E + Visual + Perf)
    runs-on: ubuntu-latest
    needs: [quality, integration, e2e]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inductlite_release_confidence
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inductlite_release_confidence?schema=public
      DATABASE_DIRECT_URL: postgresql://postgres:postgres@localhost:5432/inductlite_release_confidence?schema=public
      BASE_URL: http://localhost:3000
      PLAYWRIGHT_BROWSERS_PATH: "0"
      E2E_RETRIES: "0"
      SESSION_COOKIE_SECURE: "0"
      DATA_ENCRYPTION_KEY: ci-test-data-encryption-key-at-least-32-characters
      MAGIC_LINK_SECRET: ci-magic-link-secret
      RESEND_API_KEY: ci-resend-key
      RESEND_FROM: ci@example.com
      FEATURE_VISUAL_REGRESSION_ENABLED: "true"
      ENV_BUDGET_TIER: MVP
      MAX_MONTHLY_EGRESS_GB: "100"
      MAX_MONTHLY_STORAGE_GB: "50"
      MAX_MONTHLY_JOB_MINUTES: "1000"
      MAX_MONTHLY_SERVER_ACTION_INVOCATIONS: "1000000"
      MAX_MONTHLY_COMPUTE_INVOCATIONS: "1200000"
      MAX_MONTHLY_COMPUTE_RUNTIME_MINUTES: "2500"
      FEATURE_EXPORTS_ENABLED: "true"
      FEATURE_UPLOADS_ENABLED: "true"
      FEATURE_PUBLIC_SIGNIN_ENABLED: "true"
      BUDGET_TELEMETRY_STALE_AFTER_HOURS: "24"
      BUDGET_TELEMETRY_REQUIRED_PROVIDERS: render,neon,cloudflare_r2,upstash,resend
      EXPORT_OFFPEAK_AUTO_ENABLE_THRESHOLD_PERCENT: "101"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Cache Next and Playwright artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next/cache
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-release-confidence-cache-${{ hashFiles('package-lock.json', 'apps/web/next.config.*', 'apps/web/playwright.config.ts', 'apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-release-confidence-cache-

      - name: Install deps (workspace)
        run: npm ci

      - name: Seed CI budget telemetry
        run: |
          node <<'EOF'
          const fs = require("node:fs");
          const now = new Date();
          const iso = now.toISOString();
          const month = `${now.getUTCFullYear()}-${String(now.getUTCMonth() + 1).padStart(2, "0")}`;
          const manifest = JSON.stringify({
            capturedAt: iso,
            month,
            notes: "CI test-only provider billing manifest for release-confidence lanes.",
            entries: ["render", "neon", "cloudflare_r2", "upstash", "resend"].map((provider, index) => ({
              provider,
              sourceType: "provider_api",
              capturedAt: iso,
              amountNzd: Number(((index + 1) / 100).toFixed(2)),
              invoiceRef: `${provider}-${month}`,
            })),
          });
          fs.appendFileSync(process.env.GITHUB_ENV, `BUDGET_TELEMETRY_PROVIDER_BILLING_JSON=${manifest}\n`);
          EOF

      - name: Prisma generate
        run: npm run db:generate

      - name: Prisma validate
        run: npm run -w apps/web prisma:validate

      - name: Prisma format check
        run: npm run -w apps/web prisma:format:check

      - name: Migrate DB
        run: npm run -w apps/web db:migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed DB
        run: npm run -w apps/web db:seed

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium firefox webkit

      - name: Build
        env:
          NODE_ENV: production
        run: npm run -w apps/web build

      - name: Start standalone server
        run: |
          set -euo pipefail
          cd apps/web
          export PORT=3000
          export NODE_ENV=test
          if [ -f .next/standalone/server.js ]; then
            mkdir -p .next/standalone/.next
            rm -rf .next/standalone/.next/static
            cp -R .next/static .next/standalone/.next/static
            rm -rf .next/standalone/public
            cp -R public .next/standalone/public
          elif [ -f .next/standalone/apps/web/server.js ]; then
            mkdir -p .next/standalone/apps/web/.next
            rm -rf .next/standalone/apps/web/.next/static
            cp -R .next/static .next/standalone/apps/web/.next/static
            rm -rf .next/standalone/apps/web/public
            cp -R public .next/standalone/apps/web/public
          fi
          if [ -f .next/standalone/server.js ]; then
            node .next/standalone/server.js &
          elif [ -f .next/standalone/apps/web/server.js ]; then
            node .next/standalone/apps/web/server.js &
          else
            echo "Standalone server not found. Available server.js files:"
            find .next/standalone -name server.js -print || true
            exit 1
          fi
          echo $! > /tmp/web-release-confidence.pid
        env:
          NODE_ENV: test
          ALLOW_TEST_RUNNER: "1"
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TRUST_PROXY: "1"
          FEATURE_VISUAL_REGRESSION_ENABLED: "true"

      - name: Wait for app
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          exit 1

      - name: Verify E2E test-route gate
        run: |
          set -euo pipefail
          runtime_payload="$(curl -fsS -H "x-test-secret: ${TEST_RUNNER_SECRET_KEY}" http://localhost:3000/api/test/runtime)"
          echo "$runtime_payload"
          echo "$runtime_payload" | grep -q '"allowTestRunner":true'
          curl -fsS -X POST -H "x-test-secret: ${TEST_RUNNER_SECRET_KEY}" http://localhost:3000/api/test/clear-rate-limit >/dev/null

      - name: Detect Linux visual baselines
        id: visual_baselines
        run: |
          if ls apps/web/e2e/visual-regression.spec.ts-snapshots/*-linux.png >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping visual regression: no Linux baselines present."
          fi

      - name: Run visual regression (local snapshots)
        if: steps.visual_baselines.outputs.available == 'true'
        run: |
          set -euo pipefail
          cd apps/web
          npm run test:visual 2>&1 | tee playwright-visual-output.txt
          test_exit=${PIPESTATUS[0]}
          if [ $test_exit -ne 0 ]; then
            echo "Visual regression lane failed with exit code $test_exit"
            exit $test_exit
          fi
        env:
          E2E_USE_SHARED_SERVER: "1"
          ALLOW_TEST_RUNNER: "1"
          BASE_URL: http://localhost:3000
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TRUST_PROXY: "1"
          FEATURE_VISUAL_REGRESSION_ENABLED: "true"

      - name: Run stable regression lane (chromium)
        run: |
          set -euo pipefail
          cd apps/web
          npm run test:e2e:stable:chromium 2>&1 | tee playwright-stable-chromium-output.txt
          test_exit=${PIPESTATUS[0]}
          if [ $test_exit -ne 0 ]; then
            echo "Stable chromium lane failed with exit code $test_exit"
            exit $test_exit
          fi
        env:
          E2E_USE_SHARED_SERVER: "1"
          ALLOW_TEST_RUNNER: "1"
          BASE_URL: http://localhost:3000
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TRUST_PROXY: "1"

      - name: Run stable regression lane (webkit)
        run: |
          set -euo pipefail
          cd apps/web
          npm run test:e2e:stable:webkit 2>&1 | tee playwright-stable-webkit-output.txt
          test_exit=${PIPESTATUS[0]}
          if [ $test_exit -ne 0 ]; then
            echo "Stable webkit lane failed with exit code $test_exit"
            exit $test_exit
          fi
        env:
          E2E_USE_SHARED_SERVER: "1"
          ALLOW_TEST_RUNNER: "1"
          BASE_URL: http://localhost:3000
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TRUST_PROXY: "1"

      - name: Run stable regression lane (mobile chrome)
        run: |
          set -euo pipefail
          cd apps/web
          npm run test:e2e:stable:mobile-chrome 2>&1 | tee playwright-stable-mobile-chrome-output.txt
          test_exit=${PIPESTATUS[0]}
          if [ $test_exit -ne 0 ]; then
            echo "Stable mobile chrome lane failed with exit code $test_exit"
            exit $test_exit
          fi
        env:
          E2E_USE_SHARED_SERVER: "1"
          ALLOW_TEST_RUNNER: "1"
          BASE_URL: http://localhost:3000
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TRUST_PROXY: "1"

      - name: Run stable regression lane (mobile safari)
        run: |
          set -euo pipefail
          cd apps/web
          npm run test:e2e:stable:mobile-safari 2>&1 | tee playwright-stable-mobile-safari-output.txt
          test_exit=${PIPESTATUS[0]}
          if [ $test_exit -ne 0 ]; then
            echo "Stable mobile safari lane failed with exit code $test_exit"
            exit $test_exit
          fi
        env:
          E2E_USE_SHARED_SERVER: "1"
          ALLOW_TEST_RUNNER: "1"
          BASE_URL: http://localhost:3000
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TRUST_PROXY: "1"

      - name: Run perf-budget lane
        run: |
          set -euo pipefail
          cd apps/web
          npm run test:e2e:perf-budget 2>&1 | tee playwright-perf-output.txt
          test_exit=${PIPESTATUS[0]}
          if [ $test_exit -ne 0 ]; then
            echo "Perf-budget lane failed with exit code $test_exit"
            exit $test_exit
          fi
        env:
          E2E_USE_SHARED_SERVER: "1"
          ALLOW_TEST_RUNNER: "1"
          BASE_URL: http://localhost:3000
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TRUST_PROXY: "1"

      - name: Generate UX perf report
        run: npm run report:ux-perf-budget

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/web-release-confidence.pid ]; then
            kill $(cat /tmp/web-release-confidence.pid) || true
          fi

      - name: Print release-confidence diagnostics
        if: failure()
        run: |
          for log_file in apps/web/playwright-visual-output.txt apps/web/playwright-stable-chromium-output.txt apps/web/playwright-stable-webkit-output.txt apps/web/playwright-stable-mobile-chrome-output.txt apps/web/playwright-stable-mobile-safari-output.txt apps/web/playwright-perf-output.txt; do
            echo "=== ${log_file} (start) ==="
            if [ -f "$log_file" ]; then
              sed -n '1,400p' "$log_file" || true
            else
              echo "No log found at $log_file"
            fi
          done
          echo "=== Perf report ==="
          if [ -f apps/web/test-results/uiux-performance-budget-report.json ]; then
            sed -n '1,240p' apps/web/test-results/uiux-performance-budget-report.json || true
          else
            echo "No perf report found."
          fi

      - name: Upload release-confidence artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-confidence-artifacts
          path: |
            apps/web/playwright-report/**
            apps/web/test-results/**
            apps/web/playwright-visual-output.txt
            apps/web/playwright-stable-chromium-output.txt
            apps/web/playwright-stable-webkit-output.txt
            apps/web/playwright-stable-mobile-chrome-output.txt
            apps/web/playwright-stable-mobile-safari-output.txt
            apps/web/playwright-perf-output.txt
            docs/UI_UX_PERFORMANCE_WEEKLY_REPORT.md
          if-no-files-found: ignore
          retention-days: 7

  branch-protection-full:
    name: Full (lint • typecheck • unit • integration • e2e • visual)
    runs-on: ubuntu-latest
    needs: [quality, integration, e2e, release-confidence]
    if: ${{ always() }}
    steps:
      - name: Verify required lanes succeeded
        run: |
          test "${{ needs.quality.result }}" = "success"
          test "${{ needs.integration.result }}" = "success"
          test "${{ needs.e2e.result }}" = "success"
          test "${{ needs.release-confidence.result }}" = "success"

