name: Render Keep-Alive and Cron

on:
  schedule:
    - cron: "*/10 * * * *"
    - cron: "15 2 * * *"
  workflow_dispatch:
    inputs:
      expect_export_processed:
        description: "Fail if export scheduler does not process a queued export"
        required: false
        default: "false"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          set -euo pipefail
          url="${RENDER_APP_URL%/}/health"
          status=""
          for attempt in 1 2 3 4 5 6; do
            status="$(curl -sS -D /tmp/health-headers.txt -o /tmp/health-body.txt -w "%{http_code}" -H "User-Agent: github-actions-render-keep-alive" "$url" || true)"
            if [[ "$status" =~ ^2 ]]; then
              break
            fi
            routing_header="$(grep -i '^x-render-routing:' /tmp/health-headers.txt | tr -d '\r' | awk '{print $2}' || true)"
            if [[ "$status" == "503" && "$routing_header" == "hibernate-wake-error" && "$attempt" -lt 6 ]]; then
              echo "Render is waking from hibernation (attempt $attempt/6); retrying in 20s"
              sleep 20
              continue
            fi
            break
          done
          if [[ ! "$status" =~ ^2 ]]; then
            echo "Health check failed: HTTP $status ($url)"
            echo "--- headers ---"
            cat /tmp/health-headers.txt || true
            echo "--- body ---"
            cat /tmp/health-body.txt || true
            exit 1
          fi
          echo "--- health body ---"
          cat /tmp/health-body.txt || true
          build_commit="$(jq -r '.build.commit // empty' /tmp/health-body.txt 2>/dev/null || true)"
          build_source="$(jq -r '.build.source // empty' /tmp/health-body.txt 2>/dev/null || true)"
          if [[ -n "$build_commit" ]]; then
            echo "Render health build commit: $build_commit (source=${build_source:-unknown})"
            if [[ "$build_commit" != "$GITHUB_SHA" ]]; then
              echo "WARNING: Render commit differs from workflow SHA ($GITHUB_SHA)"
            fi
          else
            echo "Render health payload did not include build commit metadata."
          fi
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}

      - name: Run export scheduler
        run: |
          set -euo pipefail
          url="${RENDER_APP_URL%/}/api/cron/export-scheduler"
          status="$(curl -sS -D /tmp/export-scheduler-headers.txt -o /tmp/export-scheduler-body.txt -w "%{http_code}" -H "x-cron-secret: $CRON_SECRET" -H "User-Agent: github-actions-render-keep-alive" "$url" || true)"
          if [[ ! "$status" =~ ^2 ]]; then
            echo "Export scheduler failed: HTTP $status ($url)"
            echo "--- headers ---"
            cat /tmp/export-scheduler-headers.txt || true
            echo "--- body ---"
            cat /tmp/export-scheduler-body.txt || true
            exit 1
          fi
          echo "--- export scheduler body ---"
          cat /tmp/export-scheduler-body.txt || true

          ok="$(jq -r '.ok // false' /tmp/export-scheduler-body.txt 2>/dev/null || echo false)"
          processed="$(jq -r '.processed // false' /tmp/export-scheduler-body.txt 2>/dev/null || echo false)"
          result_status="$(jq -r '.result.status // "unknown"' /tmp/export-scheduler-body.txt 2>/dev/null || echo unknown)"
          duration_ms="$(jq -r '.duration_ms // 0' /tmp/export-scheduler-body.txt 2>/dev/null || echo 0)"

          {
            echo "### Export Scheduler"
            echo "- ok: $ok"
            echo "- processed: $processed"
            echo "- result.status: $result_status"
            echo "- duration_ms: $duration_ms"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$ok" != "true" ]]; then
            echo "Export scheduler response reported ok=false"
            exit 1
          fi

          if [[ "$result_status" == "FAILED" ]]; then
            echo "Export scheduler processed a job but it failed"
            exit 1
          fi

          if [[ "${EXPECT_EXPORT_PROCESSED}" == "true" && "$processed" != "true" ]]; then
            echo "Expected export scheduler to process a queued export, but it returned processed=false"
            exit 1
          fi
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          EXPECT_EXPORT_PROCESSED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.expect_export_processed || 'false' }}

      - name: Run maintenance
        if: github.event.schedule == '15 2 * * *'
        run: |
          set -euo pipefail
          echo "Running daily maintenance cron"
          url="${RENDER_APP_URL%/}/api/cron/maintenance"
          status="$(curl -sS -D /tmp/maintenance-headers.txt -o /tmp/maintenance-body.txt -w "%{http_code}" -H "x-cron-secret: $CRON_SECRET" -H "User-Agent: github-actions-render-keep-alive" "$url" || true)"
          if [[ ! "$status" =~ ^2 ]]; then
            echo "Maintenance cron failed: HTTP $status ($url)"
            echo "--- headers ---"
            cat /tmp/maintenance-headers.txt || true
            echo "--- body ---"
            cat /tmp/maintenance-body.txt || true
            exit 1
          fi
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
