name: Branch Protection Validation

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: branch-protection-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate branch protection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Validate protected branches
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          BRANCH_PROTECTION_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          BRANCH_PROTECTION_BRANCHES: main,develop
        run: npm run branch-protection-check
